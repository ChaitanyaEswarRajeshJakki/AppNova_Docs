name: Sync from AppNovaAI

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 * * * *'   # every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout AppNova_Docs
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          submodules: false

      - name: Check if AppNovaAI has new commits
        id: sha_check
        env:
          APPNOVA_PAT: ${{ secrets.APPNOVA_PAT }}
        run: |
          LATEST_SHA=$(curl -sf \
            -H "Authorization: Bearer $APPNOVA_PAT" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/ChaitanyaEswarRajeshJakki/AppNovaAI/commits/main \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['sha'])")

          STORED_SHA=$(cat .appnova-last-sha 2>/dev/null || echo "")

          echo "latest=$LATEST_SHA" >> $GITHUB_OUTPUT
          echo "stored=$STORED_SHA"  >> $GITHUB_OUTPUT

          if [ "$LATEST_SHA" = "$STORED_SHA" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "AppNovaAI unchanged (SHA: ${LATEST_SHA:0:7}) — skipping sync."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "New commits detected (${STORED_SHA:0:7} → ${LATEST_SHA:0:7}) — syncing."
          fi

      - name: Clone AppNovaAI
        if: steps.sha_check.outputs.changed == 'true'
        run: |
          git clone --depth=1 \
            https://x-access-token:${{ secrets.APPNOVA_PAT }}@github.com/ChaitanyaEswarRajeshJakki/AppNovaAI.git \
            appnova-source

      - name: Sync files from AppNovaAI
        if: steps.sha_check.outputs.changed == 'true'
        run: |
          # Sync root README
          cp appnova-source/README.md README.md

          # Patch in Docs-only sections (SVG embed + Related docs footer)
          python3 .github/scripts/patch_readme.py

          # Sync main changelog (changes/changes.md → changes.md)
          if [ -f appnova-source/changes/changes.md ]; then
            cp appnova-source/changes/changes.md changes.md
          fi

          # Sync all archived changelogs from changes/ to docs root
          for f in appnova-source/changes/changes_*.md; do
            [ -f "$f" ] && cp "$f" "$(basename "$f")"
          done

          # Sync date-named change entries (e.g. 2026-06-02_refactor.md)
          for f in appnova-source/changes/[0-9][0-9][0-9][0-9]-*.md; do
            [ -f "$f" ] && cp "$f" "$(basename "$f")"
          done

          # Sync deploy guide if present
          if [ -f appnova-source/DEPLOY_AZURE_VM_UBUNTU.md ]; then
            cp appnova-source/DEPLOY_AZURE_VM_UBUNTU.md DEPLOY_AZURE_VM_UBUNTU.md
          fi

          # Sync .env.example (safe template — never sync .env itself)
          if [ -f appnova-source/.env.example ]; then
            cp appnova-source/.env.example .env.example
          fi

          # Record the synced SHA so next run can skip if nothing changed
          echo "${{ steps.sha_check.outputs.latest }}" > .appnova-last-sha

      - name: Commit and push if changed
        if: steps.sha_check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "Files identical — nothing to commit."
          else
            SHA="${{ steps.sha_check.outputs.latest }}"
            git commit -m "chore: sync docs from AppNovaAI (${SHA:0:7})"
            git push
          fi
